name: Quality

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - name: websitebr
            path: innexar-websitebr
            run_tests: true
          - name: portal
            path: innexar-portal
            run_tests: false
          - name: training
            path: innexar-training
            run_tests: false
          - name: workspace-app
            path: innexar-workspace-app
            run_tests: false

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.app.path }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.app.path }}
        run: npm ci

      - name: Lint
        working-directory: ${{ matrix.app.path }}
        run: npm run lint

      - name: Test
        if: matrix.app.run_tests
        working-directory: ${{ matrix.app.path }}
        run: npm test -- --runInBand

      - name: Build
        working-directory: ${{ matrix.app.path }}
        run: npm run build

  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: innexar-workspace/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            innexar-workspace/backend/requirements.txt
            innexar-workspace/backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt '.[dev]' pytest-asyncio pytest-cov aiosqlite

      - name: Ruff (advisory)
        continue-on-error: true
        run: ruff check app tests

      - name: Black (advisory)
        continue-on-error: true
        run: black --check app tests

      - name: Mypy (advisory)
        continue-on-error: true
        run: mypy app

      - name: Pytest (required)
        run: PYTHONPATH=. pytest tests/ -v --tb=short

  compose-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate Docker Compose files
        run: |
          set -e
          for dir in innexar-websitebr innexar-portal innexar-training innexar-workspace-app innexar-workspace; do
            echo "==> ${dir}"
            docker compose -f "${dir}/docker-compose.yml" config -q
          done