name: Docker Images

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: websitebr
            context: innexar-websitebr
            dockerfile: innexar-websitebr/Dockerfile
            build_args: |
              NEXT_PUBLIC_USE_WORKSPACE_API=true
              NEXT_PUBLIC_WORKSPACE_API_URL=https://api.innexar.com.br
              NEXT_PUBLIC_MP_PUBLIC_KEY=
              NEXT_PUBLIC_PORTAL_URL=https://portal.innexar.com.br
              NEXT_PUBLIC_WORKSPACE_URL=https://app.innexar.com.br
          - name: portal
            context: innexar-portal
            dockerfile: innexar-portal/Dockerfile
            build_args: |
              NEXT_PUBLIC_USE_WORKSPACE_API=true
              NEXT_PUBLIC_WORKSPACE_API_URL=https://api.innexar.com.br
              NEXT_PUBLIC_SITE_URL=https://innexar.com.br
              NEXT_PUBLIC_MP_PUBLIC_KEY=
          - name: training
            context: innexar-training
            dockerfile: innexar-training/Dockerfile
            build_args: ''
          - name: workspace-app
            context: innexar-workspace-app
            dockerfile: innexar-workspace-app/Dockerfile
            build_args: |
              NEXT_PUBLIC_USE_WORKSPACE_API=true
              NEXT_PUBLIC_WORKSPACE_API_URL=https://api.innexar.com.br
          - name: workspace-backend
            context: innexar-workspace/backend
            dockerfile: innexar-workspace/backend/Dockerfile
            build_args: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/innexar-brasil/${{ matrix.service.name }}
          tags: |
            type=raw,value=latest
            type=raw,value=sha-${{ github.sha }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.service.build_args }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}