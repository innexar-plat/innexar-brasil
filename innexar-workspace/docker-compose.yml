services:
  postgres:
    image: postgres:15-alpine
    container_name: innexar-workspace-postgres
    restart: unless-stopped
    labels:
      - "innexar.scope=br"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-innexar_workspace}
      POSTGRES_USER: ${POSTGRES_USER:-workspace_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - innexar-workspace
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-workspace_user} -d ${POSTGRES_DB:-innexar_workspace}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: innexar-workspace-minio
    restart: unless-stopped
    labels:
      - "innexar.scope=br"
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - innexar-workspace

  backend:
    image: ${IMAGE:-ghcr.io/innexar-plat/innexar-workspace:latest}
    build: ./backend
    container_name: innexar-workspace-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
      - ../innexar-workspace-app/.cursor:/cursor-debug-logs
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-workspace_user}:${POSTGRES_PASSWORD:-change_me}@postgres:5432/${POSTGRES_DB:-innexar_workspace}
      SECRET_KEY_STAFF: ${SECRET_KEY_STAFF:-change-me-staff}
      SECRET_KEY_CUSTOMER: ${SECRET_KEY_CUSTOMER:-change-me-customer}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://innexar.com.br,https://www.innexar.com.br,http://localhost:3000}
      FRONTEND_URL: ${FRONTEND_URL:-https://innexar.com.br}
      SEED_TOKEN: ${SEED_TOKEN:-}
      MP_ACCESS_TOKEN: ${MP_ACCESS_TOKEN:-${MERCADOPAGO_ACCESS_TOKEN:-}}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-${MP_ACCESS_TOKEN:-}}
      MP_PUBLIC_KEY: ${MP_PUBLIC_KEY:-}
      MP_WEBHOOK_SECRET: ${MP_WEBHOOK_SECRET:-}
      PORTAL_URL: ${PORTAL_URL:-}
      DEBUG_LOG_PATH: /cursor-debug-logs/debug-712011.log
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-1}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_PROJECTS: ${MINIO_BUCKET_PROJECTS:-project-files}
    ports:
      - "8001:8000"
    networks:
      - innexar-workspace
      # Rede Traefik: só use se o backend rodar no mesmo host do site (innexar-websitebr). Senão remova esta rede e os labels abaixo.
      - fixelo_fixelo-network
    labels:
      - "innexar.scope=br"
      # Traefik: expõe a API em https://api.innexar.com.br (exige DNS api.innexar.com.br -> este host)
      - "traefik.enable=true"
      - "traefik.http.routers.workspace-api.rule=Host(`api.innexar.com.br`)"
      - "traefik.http.routers.workspace-api.entrypoints=websecure"
      - "traefik.http.routers.workspace-api.tls.certresolver=cloudflare"
      - "traefik.http.services.workspace-api.loadbalancer.server.port=8000"
      - "traefik.http.services.workspace-api.loadbalancer.passHostHeader=true"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  innexar-workspace:
    driver: bridge
  fixelo_fixelo-network:
    external: true

volumes:
  postgres_data:
  minio_data:
