services:
  innexar-websitebr:
    image: ${IMAGE_REPOSITORY:-ghcr.io/innexar-plat/innexar-brasil}/websitebr:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_USE_WORKSPACE_API=${NEXT_PUBLIC_USE_WORKSPACE_API:-true}
        - NEXT_PUBLIC_WORKSPACE_API_URL=${NEXT_PUBLIC_WORKSPACE_API_URL:-https://api.innexar.com.br}
        - NEXT_PUBLIC_MP_PUBLIC_KEY=${NEXT_PUBLIC_MP_PUBLIC_KEY:-}
        - NEXT_PUBLIC_PORTAL_URL=${NEXT_PUBLIC_PORTAL_URL:-https://portal.innexar.com.br}
        - NEXT_PUBLIC_WORKSPACE_URL=${NEXT_PUBLIC_WORKSPACE_URL:-https://app.innexar.com.br}
    container_name: innexar-websitebr
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_MP_PUBLIC_KEY=${NEXT_PUBLIC_MP_PUBLIC_KEY:-}
      # Resend Configuration (recomendado)
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-contato@innexar.com.br}
      # Email de destino
      - CONTACT_RECIPIENT_EMAIL=${CONTACT_RECIPIENT_EMAIL:-contato@innexar.com.br}
      # Resposta automática
      - ENABLE_AUTO_REPLY=${ENABLE_AUTO_REPLY:-true}
      # SMTP Configuration
      - SMTP_HOST=${SMTP_HOST:-mail.innexar.com.br}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER:-contato@innexar.com.br}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-contato@innexar.com.br}
    env_file:
      - .env
    networks:
      - fixelo_fixelo-network
    labels:
      - "innexar.scope=br"
      - "traefik.enable=true"
      # Roteamento para innexar.com.br
      - "traefik.http.routers.innexar-br.rule=Host(`innexar.com.br`) || Host(`www.innexar.com.br`)"
      - "traefik.http.routers.innexar-br.entrypoints=websecure"
      - "traefik.http.routers.innexar-br.tls.certresolver=cloudflare"
      - "traefik.http.routers.innexar-br.service=innexar-br-service"
      # Redirecionar www para não-www
      - "traefik.http.routers.innexar-br-www.rule=Host(`www.innexar.com.br`)"
      - "traefik.http.routers.innexar-br-www.entrypoints=websecure"
      - "traefik.http.routers.innexar-br-www.tls.certresolver=cloudflare"
      - "traefik.http.routers.innexar-br-www.middlewares=redirect-to-non-www-br"
      - "traefik.http.middlewares.redirect-to-non-www-br.redirectregex.regex=^https://www\\.innexar\\.com\\.br/(.*)"
      - "traefik.http.middlewares.redirect-to-non-www-br.redirectregex.replacement=https://innexar.com.br/$${1}"
      - "traefik.http.middlewares.redirect-to-non-www-br.redirectregex.permanent=true"
      # Serviço
      - "traefik.http.services.innexar-br-service.loadbalancer.server.port=3000"
      - "traefik.http.services.innexar-br-service.loadbalancer.passHostHeader=true"
      # Retry
      - "traefik.http.middlewares.innexar-br-retry.retry.attempts=3"
      - "traefik.http.routers.innexar-br.middlewares=innexar-br-retry"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  fixelo_fixelo-network:
    external: true
